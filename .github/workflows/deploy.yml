# Deploy static site to GitHub Pages. Custom domain: idanbot.me (see public/CNAME and README).
name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Pinned SHAs reduce supply-chain drift; update when bumping major actions.
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Verify CNAME
        run: |
          if [ -f dist/CNAME ]; then
            echo "CNAME found: $(cat dist/CNAME)"
          else
            echo "::error::CNAME file missing in dist folder! Ensure public/CNAME exists."
            exit 1
          fi

      - name: Verify OG image
        run: |
          if [ -f dist/og-image.svg ]; then
            echo "OG image found in dist"
          else
            echo "::error::og-image.svg missing in dist — add public/og-image.svg"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
