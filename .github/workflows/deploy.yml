# Deploy static site to GitHub Pages. Custom domain: idanbot.me (see public/CNAME and README).
name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # Pinned SHAs reduce supply-chain drift; update when bumping major actions.
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Check performance budget
        run: npm run performance:check

      - name: Install browser
        run: npx playwright install --with-deps chromium

      - name: Browser acceptance tests
        run: npm run test:e2e

      - name: Verify CNAME
        run: |
          if [ -f dist/CNAME ]; then
            echo "CNAME found: $(cat dist/CNAME)"
          else
            echo "::error::CNAME file missing in dist folder! Ensure public/CNAME exists."
            exit 1
          fi

      - name: Verify OG image
        run: |
          if [ -f dist/og-image.png ]; then
            echo "OG image found in dist"
          else
            echo "::error::og-image.png missing in dist — add public/og-image.png"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout deployment checks
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 24

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

      - name: Verify deployed HTML and asset MIME types
        run: node scripts/check-deployment.mjs "${{ steps.deployment.outputs.page_url }}"

  # Post-deploy audit: Lighthouse tracing against the animated page is slow,
  # so it runs isolated from the deploy job's tight timeout.
  lighthouse:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Lighthouse budget
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Lighthouse CI audit
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12
        with:
          urls: ${{ needs.deploy.outputs.page_url }}
          budgetPath: ./lighthouse-budget.json
          runs: 1
          temporaryPublicStorage: true
